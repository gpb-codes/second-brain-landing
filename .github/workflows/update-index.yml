# This workflow scans the PACE structure and updates Second Brain stats
# Runs on push to main, or manually via workflow_dispatch

name: Update Second Brain PACE

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - 'scripts/**'
  workflow_dispatch:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-pace:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan PACE structure
        run: |
          echo "=== Scanning PACE structure ==="
          
          # Count files in each PACE category
          PACE_DIRS=("00 Inbox" "01 Proyectos" "02 Áreas" "03 Conexiones - MOCs" "04 Extracciones AI" "05 Archivo")
          TOTAL_FILES=0
          
          for dir in "${PACE_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              COUNT=$(find "$dir" -name "*.md" -not -path "*/.obsidian/*" -not -path "*/.git/*" | wc -l)
              echo "$dir: $COUNT files"
              TOTAL_FILES=$((TOTAL_FILES + COUNT))
            fi
          done
          
          echo "Total PACE files: $TOTAL_FILES"
          
      - name: Update timestamp
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M")
          echo "Last update: $DATE"
          
          # Update the Home PACE timestamp
          HOME_FILE="03 Conexiones - MOCs/030 ÍNDICE GENERAL (Home).md"
          if [ -f "$HOME_FILE" ]; then
            sed -i "s/updated: .*/updated: $DATE/" "$HOME_FILE"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update Second Brain PACE [skip ci]"
            git push
          fi
